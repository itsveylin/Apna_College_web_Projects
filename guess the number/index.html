<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Guess The Number</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: "Poppins", sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg,#ffd6e8,#f3d9ff,#dbeafe);
    }

    .container{
      width:350px;
      padding:35px;
      border-radius:30px;
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      text-align:center;
    }

    h1{
      font-size:2rem;
      color:#ff4f81;
      margin-bottom:10px;
    }

    p{
      color:#555;
      margin-bottom:20px;
      font-size:0.95rem;
    }

    input{
      width:100%;
      padding:14px;
      border:none;
      outline:none;
      border-radius:15px;
      margin-bottom:15px;
      background:#fff;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.08);
      font-size:1rem;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:15px;
      background:#ff4f81;
      color:white;
      font-size:1rem;
      cursor:pointer;
      transition:0.3s;
      font-weight:600;
    }

    button:hover{
      transform:scale(1.03);
      background:#ff2f6d;
    }

    .message{
      margin-top:18px;
      font-size:1rem;
      color:#444;
      font-weight:500;
    }

    .cute{
      font-size:3rem;
      margin-bottom:10px;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="cute">🎀</div>

    <h1>Guess The Number</h1>

    <p>Pick a number between 1 and your maximum number ✨</p>

    <input type="number" id="maxNum" placeholder="Enter maximum number">

    <button onclick="startGame()">Start Game</button>

    <input type="number" id="guessInput" placeholder="Guess here">

    <button onclick="checkGuess()">Submit Guess</button>

    <div class="message" id="message"></div>
  </div>

  <script>

    let randomNumber;

    function startGame(){

      let k = document.getElementById("maxNum").value;

      randomNumber = Math.floor(Math.random() * k) + 1;

      document.getElementById("message").innerText =
      "Game started 💖";
    }

    function checkGuess(){

      let i = document.getElementById("guessInput").value;

      if(i == "quit"){
        document.getElementById("message").innerText =
        "You quit the game 🌷";
      }

      else if(Number(i) === randomNumber){
        document.getElementById("message").innerText =
        "Congratulations 🎉 You guessed correctly!";
      }

      else{
        document.getElementById("message").innerText =
        "Wrong guess 😭 Try again!";
      }
    }

  </script>

</body>
</html>
